name: Publish Release to Zenodo

on:
  release:
    types: [published]

jobs:
  zenodo-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload to Zenodo Sandbox (Testing)
        # Using zenodraft/action to upload the release snapshot
        uses: zenodraft/action@0.13.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set this secret in GitHub Repo settings to test on the Zenodo Sandbox
          ZENODO_SANDBOX_ACCESS_TOKEN: ${{ secrets.ZENODO_SANDBOX_ACCESS_TOKEN }}
        with:
          # If you have an existing concept ID, uncomment and set it here.
          # If omitted on the first run, a new deposition/concept will be created.
          # concept: 'YOUR_ZENODO_SANDBOX_CONCEPT_ID'
          metadata: .zenodo.json
          sandbox: true
          publish: true

      # Uncomment the step below and comment/delete the Sandbox step above
      # once you have tested the workflow and are ready to publish to production Zenodo.
      # - name: Upload to Production Zenodo
      #   uses: zenodraft/action@0.13.3
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     # Set this secret in GitHub Repo settings to publish to production Zenodo
      #     ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
      #   with:
      #     # concept: 'YOUR_PRODUCTION_ZENODO_CONCEPT_ID'
      #     metadata: .zenodo.json
      #     sandbox: false
      #     publish: true
